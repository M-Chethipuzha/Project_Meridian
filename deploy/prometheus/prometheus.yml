global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: meridian-producer
    static_configs:
      - targets: ['host.docker.internal:8081']
        labels: { service: producer }
  - job_name: meridian-consumer
    static_configs:
      - targets: ['host.docker.internal:8082']
        labels: { service: consumer }

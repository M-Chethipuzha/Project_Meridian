apiVersion: v1
kind: ConfigMap
metadata:
  name: meridian-config
  namespace: meridian
  labels:
    app.kubernetes.io/name: meridian-stream
    app.kubernetes.io/part-of: meridian
data:
  KAFKA_BROKERS: "redpanda.meridian.svc.cluster.local:9092"
  KAFKA_TOPIC: "recentchanges"
  KAFKA_GROUP: "meridian-consumer"
  SCHEMA_REGISTRY_URL: "http://redpanda.meridian.svc.cluster.local:8081"
  MINIO_ENDPOINT: "minio.meridian.svc.cluster.local:9000"
  MINIO_BUCKET: "events"
  MINIO_REGION: "us-east-1"
  WIKIMEDIA_STREAM_URL: "https://stream.wikimedia.org/v2/stream/recentchange"
  DLQ_TOPIC: "recentchanges-dlq"
  MAX_RETRIES: "3"
  BACKPRESSURE_LIMIT: "10000"

apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redpanda; namespace: meridian
  labels: { app.kubernetes.io/name: meridian-stream, app.kubernetes.io/component: redpanda }
spec:
  serviceName: redpanda
  replicas: 1
  selector:
    matchLabels: { app.kubernetes.io/component: redpanda }
  template:
    metadata:
      labels: { app.kubernetes.io/component: redpanda }
    spec:
      terminationGracePeriodSeconds: 120
      containers:
        - name: redpanda
          image: docker.redpanda.com/redpandadata/redpanda:v24.2.10
          ports:
            - containerPort: 9092; name: kafka
            - containerPort: 8081; name: schema-reg
            - containerPort: 8082; name: proxy
            - containerPort: 9644; name: admin
          command:
            - redpanda start --smp 1 --overprovisioned
            - --set redpanda.enable_transactions=true
            - --set redpanda.enable_idempotence=true
            - --set redpanda.auto_create_topics_enabled=true
            - --kafka-addr internal://0.0.0.0:9092
            - --advertise-kafka-addr internal://redpanda.meridian.svc.cluster.local:9092
            - --pandaproxy-addr 0.0.0.0:8082
            - --schema-registry-addr 0.0.0.0:8081
          livenessProbe:
            exec: { command: [rpk, cluster, health, --exit-when-healthy] }
            initialDelaySeconds: 30; periodSeconds: 15; timeoutSeconds: 5
          readinessProbe:
            exec: { command: [rpk, cluster, health, --exit-when-healthy] }
            initialDelaySeconds: 15; periodSeconds: 10; timeoutSeconds: 5
          volumeMounts:
            - name: data; mountPath: /var/lib/redpanda/data
          resources:
            requests: { cpu: 500m, memory: 512Mi }
            limits: { cpu: 2000m, memory: 2Gi }
  volumeClaimTemplates:
    - metadata: { name: data }
      spec:
        accessModes: [ReadWriteOnce]
        resources: { requests: { storage: 10Gi } }
---
apiVersion: v1
kind: Service
metadata:
  name: redpanda; namespace: meridian
  labels: { app.kubernetes.io/component: redpanda }
spec:
  clusterIP: None
  selector: { app.kubernetes.io/component: redpanda }
  ports:
    - name: kafka; port: 9092
    - name: schema-reg; port: 8081
    - name: proxy; port: 8082
    - name: admin; port: 9644

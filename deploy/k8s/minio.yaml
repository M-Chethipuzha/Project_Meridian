apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: minio
  namespace: meridian
  labels:
    app.kubernetes.io/name: meridian-stream
    app.kubernetes.io/component: minio
spec:
  serviceName: minio
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: minio
  template:
    metadata:
      labels:
        app.kubernetes.io/component: minio
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: minio
          image: quay.io/minio/minio:RELEASE.2024-12-18T13-15-44Z
          command:
            - server
            - /data
            - --console-address
            - ":9001"
          ports:
            - containerPort: 9000
              name: s3
            - containerPort: 9001
              name: console
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: meridian-secret
                  key: MINIO_ACCESS_KEY
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: meridian-secret
                  key: MINIO_SECRET_KEY
            - name: MINIO_REGION
              value: us-east-1
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: s3
            initialDelaySeconds: 15
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /minio/health/live
              port: s3
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
      # Init container to create the events bucket
      initContainers:
        - name: minio-setup
          image: quay.io/minio/mc:RELEASE.2024-12-18T10-45-02Z
          command:
            - /bin/sh
            - -c
            - |
              sleep 2
              mc alias set meridian http://minio:9000 "$MINIO_ACCESS_KEY" "$MINIO_SECRET_KEY"
              mc mb meridian/events --ignore-existing
              echo "Bucket meridian/events ready"
          env:
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: meridian-secret
                  key: MINIO_ACCESS_KEY
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: meridian-secret
                  key: MINIO_SECRET_KEY
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 50Gi
---
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: meridian
  labels:
    app.kubernetes.io/component: minio
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/component: minio
  ports:
    - name: s3
      port: 9000
    - name: console
      port: 9001

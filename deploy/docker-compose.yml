# Meridian Stream — Sprint 0
services:
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.2.10
    container_name: meridian-redpanda
    command:
      - redpanda
      - start
      - --smp
      - "1"
      - --overprovisioned
      - --kafka-addr
      - internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr
      - internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr
      - 0.0.0.0:8082
    ports:
      - "19092:19092"
      - "8082:8082"
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  console:
    image: docker.redpanda.com/redpandadata/console:v2.7.2
    container_name: meridian-console
    depends_on:
      redpanda: { condition: service_healthy }
    ports:
      - "8080:8080"
    environment:
      KAFKA_BROKERS: redpanda:9092
    restart: unless-stopped

volumes:
  redpanda_data:
